apiVersion: v1
kind: Service
metadata:
  name: backend-vip
  namespace: data-platform-dev
  annotations:
    metallb.io/address-pool: platform-pool
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.56.241
  selector:
    app: backend
  ports:
    - name: http
      port: 8000
      protocol: TCP
      targetPort: 8000

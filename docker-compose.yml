services:
  # ─────────────────────────────
  # MongoDB – 사용자/인증 데이터
  # ─────────────────────────────
  mongo:
    image: mongo:8.2.5
    container_name: mongo
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: fin_user
      MONGO_INITDB_ROOT_PASSWORD: fin_pass
      MONGO_INITDB_DATABASE: fin_ai
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # ─────────────────────────────
  # Redis – 세션 스토어
  # ─────────────────────────────
  redis:
    image: redis:8.6.1
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  # ─────────────────────────────
  # Ollama – local LLM / embeddings
  # 호스트에 Ollama가 이미 실행 중이면 이 서비스는 건너뜁니다.
  # 사용: docker compose --profile local-ollama up
  # ─────────────────────────────
  ollama:
    profiles: [local-ollama]
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - /mnt/c/Users/1/.ollama:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  # ─────────────────────────────
  # Qdrant – vector database
  # 호스트에 Qdrant가 이미 실행 중이면 이 서비스는 건너뜁니다.
  # 사용: docker compose --profile local-qdrant up
  # ─────────────────────────────
  qdrant:
    profiles: [local-qdrant]
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ─────────────────────────────
  # Model pull (one-shot init)
  # local-ollama 프로필 활성화 시에만 실행됩니다.
  # ─────────────────────────────
  model-pull:
    profiles: [local-ollama]
    image: ollama/ollama:latest
    container_name: model-pull
    depends_on:
      ollama:
        condition: service_started
    volumes:
      - /mnt/c/Users/1/.ollama:/root/.ollama
    entrypoint: >
      sh -c "
        ollama pull ${LLM_MODEL:-llama3.1} &&
        ollama pull ${EMBED_MODEL:-nomic-embed-text} &&
        echo 'Models ready.'
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  # ─────────────────────────────
  # App – Python/FastAPI server
  # ─────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fin-ai-app
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # OLLAMA_BASE_URL, QDRANT_URL 은 .env 에서 직접 관리 (쉘 오염 방지)
      - MONGO_URI=mongodb://fin_user:fin_pass@mongo:27017/fin_ai?authSource=admin
      - REDIS_URL=redis://redis:6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - app_data:/app/data
      - ./data:/app/data/csv:ro
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  # ─────────────────────────────
  # Ingest job (one-shot)
  # Run: docker compose run --rm ingest
  # ─────────────────────────────
  ingest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fin-ai-ingest
    env_file: .env
    environment:
      - MONGO_URI=mongodb://fin_user:fin_pass@mongo:27017/fin_ai?authSource=admin
      - REDIS_URL=redis://redis:6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - app_data:/app/data
      - ./data:/app/data/csv:ro
    depends_on:
      - mongo
      - redis
    entrypoint: ["python", "-m", "app.services.financial_ingest"]
    restart: "no"

volumes:
  mongo_data:
  redis_data:
  qdrant_data:
  app_data:

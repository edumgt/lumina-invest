services:
  neo4j:
    image: neo4j:5.18-community
    container_name: fin-ai-neo4j
    ports:
    - "7474:7474"
    - "7687:7687"
    environment:
    - NEO4J_AUTH=neo4j/finagent123
    volumes:
    - neo4j_data:/data
    networks:
    - shared-net
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fin-ai-app
    ports:
    - 8966:8000
    env_file: .env
    environment:
    - MONGO_URI=mongodb://mongo:27017/fin_ai
    - REDIS_URL=redis://redis:6379
    - NEO4J_URI=bolt://neo4j:7687
    - NEO4J_USER=neo4j
    - NEO4J_PASSWORD=finagent123
    extra_hosts:
    - host.docker.internal:host-gateway
    volumes:
    - app_data:/app/data
    - ./data:/app/data/csv:ro
    restart: unless-stopped
    networks:
    - shared-net
    depends_on:
    - neo4j

  ingest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fin-ai-ingest
    env_file: .env
    environment:
    - MONGO_URI=mongodb://mongo:27017/fin_ai
    - REDIS_URL=redis://redis:6379
    - NEO4J_URI=bolt://neo4j:7687
    - NEO4J_USER=neo4j
    - NEO4J_PASSWORD=finagent123
    extra_hosts:
    - host.docker.internal:host-gateway
    volumes:
    - app_data:/app/data
    - ./data:/app/data/csv:ro
    entrypoint:
    - python
    - -m
    - app.services.financial_ingest
    restart: 'no'
    networks:
    - shared-net

volumes:
  app_data: null
  neo4j_data: null

networks:
  shared-net:
    external: true

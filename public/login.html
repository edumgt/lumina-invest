<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>로그인 | Lumina Invest</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #f4f6fa;
      color: #0f172a;
      font-family: 'Pretendard', -apple-system, sans-serif;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(37,99,235,0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(217,119,6,0.04) 0%, transparent 40%);
    }
    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }
    .brand {
      text-align: center;
      margin-bottom: 36px;
    }
    .brand-icon {
      width: 52px;
      height: 52px;
      margin: 0 auto 14px;
      background: linear-gradient(135deg, #4a90e2, #f0b429);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: #fff;
      box-shadow: 0 0 24px rgba(74,144,226,0.35);
    }
    .brand-name {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .brand-name { color: #0f172a; }
    .brand-sub {
      font-size: 13px;
      color: #64748b;
      margin-top: 4px;
    }
    .card {
      background: #ffffff;
      border: 1px solid #dde2ec;
      border-radius: 14px;
      padding: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .card-title {
      font-size: 18px;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 24px;
    }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; color: #64748b; margin-bottom: 6px; }
    .form-input {
      width: 100%;
      padding: 10px 14px;
      background: #f4f6fa;
      border: 1px solid #dde2ec;
      border-radius: 8px;
      color: #0f172a !important;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .form-input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.10); }
    .form-input::placeholder { color: #94a3b8 !important; }
    .btn-submit {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
      transition: background .15s, box-shadow .15s;
      font-family: inherit;
    }
    .btn-submit:hover { background: #1d4ed8; box-shadow: 0 4px 16px rgba(37,99,235,0.25); }
    .form-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
      color: #64748b;
    }
    .form-footer a { color: #2563eb; text-decoration: none; }
    .form-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="brand">
      <div class="brand-icon"><i class="fa-solid fa-chart-mixed"></i></div>
      <div class="brand-name">Lumina Invest</div>
      <div class="brand-sub">AI 기반 금융 분석 · 퀀트 매매 플랫폼</div>
    </div>

    <div class="card">
      <div class="card-title">로그인</div>
      <form id="f">
        <div class="form-group">
          <label class="form-label">이메일</label>
          <input name="email" type="email" class="form-input" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">비밀번호</label>
          <input name="password" type="password" class="form-input" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-submit">
          <i class="fa-solid fa-arrow-right-to-bracket" style="margin-right:6px;"></i>로그인
        </button>
      </form>
      <div class="form-footer">
        계정이 없나요? <a href="/register.html">회원가입</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { api, setToast } from "/js/common.js";
    document.getElementById("f").addEventListener("submit", async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      try {
        await api("/api/auth/login", {
          method: "POST",
          body: { email: fd.get("email"), password: fd.get("password") },
        });
        location.href = "/app.html";
      } catch (err) {
        setToast(err.message, "error");
      }
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>로그인 | Lumina Invest</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" as="style" onload="this.rel='stylesheet'"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <noscript>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  </noscript>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #f4f6fa;
      color: #0f172a;
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;
      font-size: 18px;
      font-feature-settings: "kern" 1;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      word-break: keep-all;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(37,99,235,0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(217,119,6,0.04) 0%, transparent 40%);
    }
    .login-wrap {
      width: 100%;
      max-width: 440px;
      padding: 24px;
    }
    .brand {
      text-align: center;
      margin-bottom: 36px;
    }
    .brand-icon {
      width: 58px;
      height: 58px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, #4a90e2, #f0b429);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #fff;
      box-shadow: 0 0 28px rgba(74,144,226,0.35);
    }
    .brand-name {
      font-size: 26px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.5px;
    }
    .brand-sub {
      font-size: 15px;
      color: #64748b;
      margin-top: 6px;
      line-height: 1.5;
    }
    .card {
      background: #ffffff;
      border: 1px solid #dde2ec;
      border-radius: 16px;
      padding: 36px;
      box-shadow: 0 4px 28px rgba(0,0,0,0.08);
    }
    .card-title {
      font-size: 20px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 28px;
    }
    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block;
      font-size: 15px;
      font-weight: 500;
      color: #475569;
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: #f8fafc;
      border: 1.5px solid #dde2ec;
      border-radius: 10px;
      color: #0f172a;
      font-size: 17px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .form-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
      background: #fff;
    }
    .form-input::placeholder { color: #94a3b8; }
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: #2563eb;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 8px;
      transition: background .15s, box-shadow .15s;
      font-family: inherit;
      letter-spacing: -0.2px;
    }
    .btn-submit:hover { background: #1d4ed8; box-shadow: 0 4px 18px rgba(37,99,235,0.28); }
    .btn-submit:active { background: #1e40af; }
    .form-footer {
      margin-top: 22px;
      text-align: center;
      font-size: 15px;
      color: #64748b;
    }
    .form-footer a { color: #2563eb; text-decoration: none; font-weight: 600; }
    .form-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="brand">
      <div class="brand-icon"><i class="fa-solid fa-chart-mixed"></i></div>
      <div class="brand-name">Lumina Invest</div>
      <div class="brand-sub">AI 기반 금융 분석 · 퀀트 매매 플랫폼</div>
    </div>

    <div class="card">
      <div class="card-title">로그인</div>
      <form id="f">
        <div class="form-group">
          <label class="form-label">이메일</label>
          <input name="email" type="email" class="form-input" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">비밀번호</label>
          <input name="password" type="password" class="form-input" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-submit">
          <i class="fa-solid fa-arrow-right-to-bracket" style="margin-right:8px;"></i>로그인
        </button>
      </form>
      <div class="form-footer">
        계정이 없나요? <a href="/register.html">회원가입</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { api, setToast } from "/js/common.js";
    document.getElementById("f").addEventListener("submit", async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      try {
        await api("/api/auth/login", {
          method: "POST",
          body: { email: fd.get("email"), password: fd.get("password") },
        });
        location.href = "/app.html";
      } catch (err) {
        setToast(err.message, "error");
      }
    });
  </script>
</body>
</html>

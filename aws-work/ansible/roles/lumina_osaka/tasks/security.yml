---
- name: Ensure Osaka ALB security group exists
  amazon.aws.ec2_security_group:
    name: "{{ lumina_osaka.security_groups.alb }}"
    description: Public ALB for Lumina Osaka
    vpc_id: "{{ lumina_osaka_vpc_id }}"
    rules:
      - proto: tcp
        from_port: 80
        to_port: 80
        cidr_ip:
          - 0.0.0.0/0
        rule_desc: Public HTTP ingress
    rules_egress:
      - proto: -1
        cidr_ip:
          - 0.0.0.0/0
    tags: "{{ lumina_osaka.tags | combine({'Name': lumina_osaka.security_groups.alb}) }}"

- name: Ensure Osaka ECS security group exists
  amazon.aws.ec2_security_group:
    name: "{{ lumina_osaka.security_groups.ecs }}"
    description: ECS tasks for Lumina Osaka
    vpc_id: "{{ lumina_osaka_vpc_id }}"
    rules:
      - proto: tcp
        from_port: 8000
        to_port: 8000
        group_name:
          - "{{ lumina_osaka.security_groups.alb }}"
        rule_desc: ALB to ECS API
    rules_egress:
      - proto: -1
        cidr_ip:
          - 0.0.0.0/0
    tags: "{{ lumina_osaka.tags | combine({'Name': lumina_osaka.security_groups.ecs}) }}"
  register: lumina_osaka_ecs_sg_result

- name: Set Osaka ECS security group fact
  ansible.builtin.set_fact:
    lumina_osaka_ecs_security_group_id: "{{ lumina_osaka_ecs_sg_result.group_id }}"


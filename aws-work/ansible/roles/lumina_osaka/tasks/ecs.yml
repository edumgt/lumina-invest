- name: Ensure Osaka ECS cluster exists
  community.aws.ecs_cluster:
    name: "{{ lumina_osaka.ecs.cluster_name }}"
    state: present
    capacity_providers:
      - FARGATE
      - FARGATE_SPOT
    capacity_provider_strategy:
      - capacity_provider: FARGATE
        base: 1
        weight: 1

- name: Build Osaka ECS secret references
  ansible.builtin.set_fact:
    lumina_osaka_api_secret_refs:
      - { name: "SESSION_SECRET", valueFrom: "{{ lumina_osaka.secret.name }}:SESSION_SECRET::" }
      - { name: "JWT_SECRET", valueFrom: "{{ lumina_osaka.secret.name }}:JWT_SECRET::" }
      - { name: "MONGO_URI", valueFrom: "{{ lumina_osaka.secret.name }}:MONGO_URI::" }
      - { name: "REDIS_URL", valueFrom: "{{ lumina_osaka.secret.name }}:REDIS_URL::" }
      - { name: "OLLAMA_BASE_URL", valueFrom: "{{ lumina_osaka.secret.name }}:OLLAMA_BASE_URL::" }
      - { name: "QDRANT_URL", valueFrom: "{{ lumina_osaka.secret.name }}:QDRANT_URL::" }
      - { name: "NEO4J_URI", valueFrom: "{{ lumina_osaka.secret.name }}:NEO4J_URI::" }
      - { name: "NEO4J_USER", valueFrom: "{{ lumina_osaka.secret.name }}:NEO4J_USER::" }
      - { name: "NEO4J_PASSWORD", valueFrom: "{{ lumina_osaka.secret.name }}:NEO4J_PASSWORD::" }
    lumina_osaka_worker_secret_refs:
      - { name: "MONGO_URI", valueFrom: "{{ lumina_osaka.secret.name }}:MONGO_URI::" }
      - { name: "REDIS_URL", valueFrom: "{{ lumina_osaka.secret.name }}:REDIS_URL::" }
      - { name: "OLLAMA_BASE_URL", valueFrom: "{{ lumina_osaka.secret.name }}:OLLAMA_BASE_URL::" }
      - { name: "QDRANT_URL", valueFrom: "{{ lumina_osaka.secret.name }}:QDRANT_URL::" }
      - { name: "NEO4J_URI", valueFrom: "{{ lumina_osaka.secret.name }}:NEO4J_URI::" }
      - { name: "NEO4J_USER", valueFrom: "{{ lumina_osaka.secret.name }}:NEO4J_USER::" }
      - { name: "NEO4J_PASSWORD", valueFrom: "{{ lumina_osaka.secret.name }}:NEO4J_PASSWORD::" }

- name: Register Osaka API task definition
  community.aws.ecs_taskdefinition:
    state: present
    family: "{{ lumina_osaka.ecs.services.api.family }}"
    launch_type: FARGATE
    network_mode: awsvpc
    cpu: "{{ lumina_osaka.ecs.services.api.cpu }}"
    memory: "{{ lumina_osaka.ecs.services.api.memory }}"
    execution_role_arn: "arn:aws:iam::{{ aws_account_id }}:role/{{ lumina_osaka.iam.ecs_execution_role }}"
    task_role_arn: "arn:aws:iam::{{ aws_account_id }}:role/{{ lumina_osaka.iam.ecs_task_role }}"
    containers:
      - name: "{{ lumina_osaka.ecs.services.api.container_name }}"
        image: "{{ lumina_osaka.ecs.services.api.image }}"
        essential: true
        portMappings:
          - containerPort: "{{ lumina_osaka.ecs.services.api.port }}"
            protocol: tcp
        environment: "{{ lumina_osaka.ecs.services.api.environment }}"
        secrets: "{{ lumina_osaka_api_secret_refs }}"
        healthCheck:
          command:
            - CMD-SHELL
            - curl -f http://localhost:8000/api/health || exit 1
          interval: 30
          timeout: 10
          retries: 3
          startPeriod: 60
        logConfiguration:
          logDriver: awslogs
          options:
            awslogs-group: "{{ lumina_osaka.ecs.services.api.log_group }}"
            awslogs-region: "{{ aws_region }}"
            awslogs-stream-prefix: ecs
  register: lumina_osaka_api_taskdef

- name: Register Osaka worker task definition
  community.aws.ecs_taskdefinition:
    state: present
    family: "{{ lumina_osaka.ecs.services.worker.family }}"
    launch_type: FARGATE
    network_mode: awsvpc
    cpu: "{{ lumina_osaka.ecs.services.worker.cpu }}"
    memory: "{{ lumina_osaka.ecs.services.worker.memory }}"
    execution_role_arn: "arn:aws:iam::{{ aws_account_id }}:role/{{ lumina_osaka.iam.ecs_execution_role }}"
    task_role_arn: "arn:aws:iam::{{ aws_account_id }}:role/{{ lumina_osaka.iam.ecs_task_role }}"
    containers:
      - name: "{{ lumina_osaka.ecs.services.worker.container_name }}"
        image: "{{ lumina_osaka.ecs.services.worker.image }}"
        essential: true
        command: "{{ lumina_osaka.ecs.services.worker.command }}"
        environment: "{{ lumina_osaka.ecs.services.worker.environment }}"
        secrets: "{{ lumina_osaka_worker_secret_refs }}"
        logConfiguration:
          logDriver: awslogs
          options:
            awslogs-group: "{{ lumina_osaka.ecs.services.worker.log_group }}"
            awslogs-region: "{{ aws_region }}"
            awslogs-stream-prefix: ecs
  register: lumina_osaka_worker_taskdef

- name: Set Osaka task definition refs
  ansible.builtin.set_fact:
    lumina_osaka_api_taskdef_ref: "{{ lumina_osaka_api_taskdef.family }}:{{ lumina_osaka_api_taskdef.revision }}"
    lumina_osaka_worker_taskdef_ref: "{{ lumina_osaka_worker_taskdef.family }}:{{ lumina_osaka_worker_taskdef.revision }}"

- name: Ensure Osaka API target group exists
  community.aws.elb_target_group:
    name: "{{ lumina_osaka.alb.target_group_name }}"
    protocol: HTTP
    port: "{{ lumina_osaka.ecs.services.api.port }}"
    vpc_id: "{{ lumina_osaka_vpc_id }}"
    target_type: ip
    health_check_protocol: HTTP
    health_check_path: "{{ lumina_osaka.alb.health_check_path }}"
    health_check_port: traffic-port
    successful_response_codes: "{{ lumina_osaka.alb.health_check_matcher }}"
    health_check_interval: 30
    health_check_timeout: 5
    healthy_threshold_count: 3
    unhealthy_threshold_count: 3
    tags: "{{ lumina_osaka.tags | combine({'Name': lumina_osaka.alb.target_group_name}) }}"
    state: present
  register: lumina_osaka_api_tg

- name: Ensure Osaka ALB exists
  amazon.aws.elb_application_lb:
    name: "{{ lumina_osaka.alb.name }}"
    state: present
    scheme: internet-facing
    subnets: "{{ lumina_osaka_alb_subnet_ids }}"
    security_groups:
      - "{{ lumina_osaka.security_groups.alb }}"
    purge_listeners: true
    purge_rules: false
    listeners:
      - Protocol: HTTP
        Port: 80
        DefaultActions:
          - Type: forward
            TargetGroupArn: "{{ lumina_osaka_api_tg.target_group_arn }}"
    tags: "{{ lumina_osaka.tags | combine({'Name': lumina_osaka.alb.name}) }}"
  register: lumina_osaka_alb_result

- name: Set Osaka ALB DNS fact
  ansible.builtin.set_fact:
    lumina_osaka_alb_dns_name: "{{ lumina_osaka_alb_result.dns_name }}"

- name: Ensure Osaka API ECS service exists
  community.aws.ecs_service:
    state: present
    name: "{{ lumina_osaka.ecs.services.api.service_name }}"
    cluster: "{{ lumina_osaka.ecs.cluster_name }}"
    task_definition: "{{ lumina_osaka_api_taskdef_ref }}"
    desired_count: "{{ lumina_osaka.ecs.services.api.desired_count }}"
    launch_type: FARGATE
    network_configuration:
      subnets: "{{ lumina_osaka_app_subnet_ids }}"
      security_groups:
        - "{{ lumina_osaka.security_groups.ecs }}"
      assign_public_ip: "{{ lumina_osaka.ecs.assign_public_ip }}"
    load_balancers:
      - targetGroupArn: "{{ lumina_osaka_api_tg.target_group_arn }}"
        containerName: "{{ lumina_osaka.ecs.services.api.container_name }}"
        containerPort: "{{ lumina_osaka.ecs.services.api.port }}"
    force_new_deployment: true
    deployment_configuration:
      maximum_percent: 200
      minimum_healthy_percent: 50
    tags: "{{ lumina_osaka.tags }}"

- name: Ensure Osaka worker ECS service exists
  community.aws.ecs_service:
    state: present
    name: "{{ lumina_osaka.ecs.services.worker.service_name }}"
    cluster: "{{ lumina_osaka.ecs.cluster_name }}"
    task_definition: "{{ lumina_osaka_worker_taskdef_ref }}"
    desired_count: "{{ lumina_osaka.ecs.services.worker.desired_count }}"
    launch_type: FARGATE
    network_configuration:
      subnets: "{{ lumina_osaka_app_subnet_ids }}"
      security_groups:
        - "{{ lumina_osaka.security_groups.ecs }}"
      assign_public_ip: "{{ lumina_osaka.ecs.assign_public_ip }}"
    force_new_deployment: true
    deployment_configuration:
      maximum_percent: 200
      minimum_healthy_percent: 50
    tags: "{{ lumina_osaka.tags }}"

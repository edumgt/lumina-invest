---
- name: Build Osaka runtime secret payload
  ansible.builtin.set_fact:
    lumina_osaka_runtime_secret:
      SESSION_SECRET: "{{ lumina_osaka_secret_values.SESSION_SECRET }}"
      JWT_SECRET: "{{ lumina_osaka_secret_values.JWT_SECRET }}"
      MONGO_URI: "mongodb://{{ lumina_osaka.docdb.master_username }}:{{ lumina_osaka_docdb_master_password }}@{{ lumina_osaka_docdb_endpoint }}:27017/{{ lumina_osaka.docdb.db_name }}?tls=true&replicaSet=rs0&readPreference=secondaryPreferred&retryWrites=false"
      REDIS_URL: "redis://{{ lumina_osaka_dependency_private_ip }}:6379"
      OLLAMA_BASE_URL: "http://{{ lumina_osaka_dependency_private_ip }}:11434"
      QDRANT_URL: "http://{{ lumina_osaka_dependency_private_ip }}:6333"
      NEO4J_URI: "bolt://{{ lumina_osaka_dependency_private_ip }}:7687"
      NEO4J_USER: "{{ lumina_osaka_secret_values.NEO4J_USER }}"
      NEO4J_PASSWORD: "{{ lumina_osaka_secret_values.NEO4J_PASSWORD }}"

- name: Ensure Osaka runtime secret exists
  community.aws.secretsmanager_secret:
    name: "{{ lumina_osaka.secret.name }}"
    description: "{{ lumina_osaka.secret.description }}"
    state: present
    overwrite: true
    json_secret: "{{ lumina_osaka_runtime_secret }}"
    tags: "{{ lumina_osaka.tags | combine({'Name': lumina_osaka.secret.name}) }}"
  no_log: true


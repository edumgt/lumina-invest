---
- name: Ensure ALB security group exists
  amazon.aws.ec2_security_group:
    name: "{{ lumina_security_groups.alb.name }}"
    description: Security group for Lumina public ALB
    vpc_id: "{{ lumina_vpc_id }}"
    rules:
      - proto: tcp
        from_port: 80
        to_port: 80
        cidr_ip:
          - 0.0.0.0/0
        rule_desc: Public HTTP ingress
    rules_egress:
      - proto: -1
        cidr_ip:
          - 0.0.0.0/0
    tags: "{{ lumina_tags | combine({'Name': lumina_security_groups.alb.name}) }}"

- name: Ensure ECS security group exists
  amazon.aws.ec2_security_group:
    name: "{{ lumina_security_groups.ecs.name }}"
    description: Security group for Lumina ECS services
    vpc_id: "{{ lumina_vpc_id }}"
    rules:
      - proto: tcp
        from_port: 8000
        to_port: 8000
        group_name:
          - "{{ lumina_security_groups.alb.name }}"
        rule_desc: ALB to ECS API
    rules_egress:
      - proto: -1
        cidr_ip:
          - 0.0.0.0/0
    tags: "{{ lumina_tags | combine({'Name': lumina_security_groups.ecs.name}) }}"

- name: Ensure DocumentDB security group exists
  amazon.aws.ec2_security_group:
    name: "{{ lumina_security_groups.docdb.name }}"
    description: Security group for Lumina DocumentDB access
    vpc_id: "{{ lumina_vpc_id }}"
    rules:
      - proto: tcp
        from_port: 27017
        to_port: 27017
        group_name:
          - "{{ lumina_security_groups.ecs.name }}"
        rule_desc: ECS to DocumentDB
    rules_egress:
      - proto: -1
        cidr_ip:
          - 0.0.0.0/0
    tags: "{{ lumina_tags | combine({'Name': lumina_security_groups.docdb.name}) }}"

- name: Ensure dependency host security group exists
  amazon.aws.ec2_security_group:
    name: "{{ lumina_security_groups.dependencies.name }}"
    description: Security group for Redis, Neo4j, Ollama and Qdrant host
    vpc_id: "{{ lumina_vpc_id }}"
    rules:
      - proto: tcp
        from_port: 6379
        to_port: 6379
        group_name:
          - "{{ lumina_security_groups.ecs.name }}"
        rule_desc: ECS to Redis
      - proto: tcp
        from_port: 11434
        to_port: 11434
        group_name:
          - "{{ lumina_security_groups.ecs.name }}"
        rule_desc: ECS to Ollama
      - proto: tcp
        from_port: 6333
        to_port: 6333
        group_name:
          - "{{ lumina_security_groups.ecs.name }}"
        rule_desc: ECS to Qdrant
      - proto: tcp
        from_port: 7687
        to_port: 7687
        group_name:
          - "{{ lumina_security_groups.ecs.name }}"
        rule_desc: ECS to Neo4j bolt
    rules_egress:
      - proto: -1
        cidr_ip:
          - 0.0.0.0/0
    tags: "{{ lumina_tags | combine({'Name': lumina_security_groups.dependencies.name}) }}"


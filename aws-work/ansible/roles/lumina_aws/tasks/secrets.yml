---
- name: Ensure runtime secret exists
  community.aws.secretsmanager_secret:
    name: "{{ lumina_secret.name }}"
    description: "{{ lumina_secret.description }}"
    state: present
    overwrite: true
    json_secret: "{{ lumina_secret_string }}"
    tags: "{{ lumina_tags | combine({'Name': lumina_secret.name}) }}"
  no_log: true

